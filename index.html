<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>數學能力小遊戲</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script src="data.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #eef5ff;
      --bg-2: #dfeaff;
      --ink: #1b1d23;
      --muted: #6d7480;
      --accent: #2f6fed;
      --accent-2: #2f6fed;
      --card: #ffffff;
      --ok: #1b8f5a;
      --bad: #c43b2f;
      --shadow: 0 10px 30px rgba(20, 24, 36, 0.12);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Space Grotesk", sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 800px at 10% 10%, #f5f9ff 0%, var(--bg-1) 45%, var(--bg-2) 100%);
      height: 100vh;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(12px);
      opacity: 0.45;
      z-index: -1;
    }

    body::before {
      background: radial-gradient(circle, rgba(47, 111, 237, 0.45), rgba(47, 111, 237, 0));
      left: -120px;
      bottom: -120px;
    }

    body::after {
      background: radial-gradient(circle, rgba(120, 170, 255, 0.6), rgba(120, 170, 255, 0));
      right: -120px;
      top: -140px;
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .title {
      font-family: "Space Grotesk", "Noto Sans TC", sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .pill {
      background: #fff;
      border: 1px solid #e4e7ee;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    .progress-wrap {
      height: 8px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #e9ecf3;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      transition: width 220ms ease;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      right: -50px;
      top: -50px;
      background: conic-gradient(from 120deg, rgba(47, 111, 237, 0.15), rgba(255, 122, 89, 0.15), rgba(47, 111, 237, 0.15));
      border-radius: 50%;
    }

    .question-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .question {
      font-size: 20px;
      line-height: 1.5;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
      flex: 1;
      align-content: start;
    }

    .choice {
      border: 2px solid #e8ebf2;
      border-radius: 14px;
      padding: 12px 10px;
      background: #fff;
      font-size: 14px;
      text-align: left;
      line-height: 1.3;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    .choice.selected {
      border-color: var(--accent-2);
      box-shadow: 0 6px 16px rgba(47, 111, 237, 0.2);
      transform: translateY(-2px);
    }

    .choice:active {
      transform: scale(0.98);
    }

    .choice.reveal {
      animation: riseIn 260ms ease both;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: auto;
      padding-top: 12px;
    }

    .btn {
      flex: 1;
      border: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 4px 12px rgba(47, 111, 237, 0.3);
    }

    .btn-ghost {
      background: #f5f6fb;
      color: var(--ink);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(18, 20, 27, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 20;
      backdrop-filter: blur(6px);
    }

    .modal.show { display: flex; }

    .modal-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      max-width: 520px;
      width: 100%;
      box-shadow: var(--shadow);
      animation: popIn 200ms ease both;
    }

    .modal-card.ok { border-left: 5px solid var(--ok); }
    .modal-card.bad { border-left: 5px solid var(--bad); }

    .modal-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      text-align: center;
    }

    .stat {
      background: #fff;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #edf0f6;
      box-shadow: 0 6px 16px rgba(20, 24, 36, 0.06);
    }

    .stat .num {
      font-family: "Space Grotesk", "Noto Sans TC", sans-serif;
      font-size: 18px;
      font-weight: 700;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 420px) {
      .choices { grid-template-columns: 1fr; }
      .question { font-size: 18px; }
      .choice { font-size: 13px; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">數學能力小遊戲</div>
      <div class="pill" id="progressPill">第 1 題 / 1 題</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="stats" id="statsBox">
      <div class="stat">
        <div class="num" id="statCorrect">0</div>
        <div>正確</div>
      </div>
      <div class="stat">
        <div class="num" id="statTotal">0</div>
        <div>作答</div>
      </div>
      <div class="stat">
        <div class="num" id="statStreak">0</div>
        <div>連續</div>
      </div>
    </div>

    <div class="card">
      <div class="question-label">題目</div>
      <div class="question" id="questionText">載入中...</div>
      <div class="tags" id="questionTags"></div>
      <div class="choices" id="choiceList"></div>

      <div class="actions">
        <button class="btn btn-ghost" id="btnClear">清除選取</button>
        <button class="btn btn-primary" id="btnSubmit">送出作答</button>
      </div>
    </div>

    <div class="footer">點選下方性質來完成解題所需的要點</div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card" id="modalCard">
      <div id="modalContent"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="modalClose">知道了</button>
      </div>
    </div>
  </div>

  <script>
    let PROPERTIES = [];
    let questionLoader = null;
    let currentQuestion = null;

    const state = {
      index: 0,
      selected: new Set(),
      correct: 0,
      total: 0,
      streak: 0,
      startTime: Date.now(),
      answered: false
    };

    const els = {
      progress: document.getElementById("progressPill"),
      progressBar: document.getElementById("progressBar"),
      question: document.getElementById("questionText"),
      tags: document.getElementById("questionTags"),
      choices: document.getElementById("choiceList"),
      modal: document.getElementById("modal"),
      modalCard: document.getElementById("modalCard"),
      modalContent: document.getElementById("modalContent"),
      modalClose: document.getElementById("modalClose"),
      btnClear: document.getElementById("btnClear"),
      btnSubmit: document.getElementById("btnSubmit"),
      statCorrect: document.getElementById("statCorrect"),
      statTotal: document.getElementById("statTotal"),
      statStreak: document.getElementById("statStreak")
    };

    function propertyById(id) {
      return PROPERTIES.find(p => p.id === id);
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function saveStats() {
      localStorage.setItem("mathGameStats", JSON.stringify({
        correct: state.correct,
        total: state.total,
        streak: state.streak
      }));
    }

    function updateStatsUI() {
      els.statCorrect.textContent = state.correct;
      els.statTotal.textContent = state.total;
      els.statStreak.textContent = state.streak;
    }

    function renderQuestion() {
      const q = currentQuestion;
      els.progress.textContent = `第 ${state.index + 1} 題 / ${questionLoader.total} 題`;
      const pct = ((state.index + 1) / questionLoader.total) * 100;
      els.progressBar.style.width = `${pct}%`;
      els.question.innerHTML = q.stem;
      els.tags.innerHTML = "";
      q.tags.forEach(tag => {
        const span = document.createElement("span");
        span.textContent = `#${tag}`;
        els.tags.appendChild(span);
      });

      state.selected.clear();
      state.answered = false;
      hideModal();

      const choiceIds = shuffle(q.choices);
      els.choices.innerHTML = "";
      choiceIds.forEach((id, idx) => {
        const prop = propertyById(id);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice";
        btn.dataset.id = id;
        btn.innerHTML = prop ? prop.label : id;
        btn.style.animationDelay = `${idx * 40}ms`;
        btn.classList.add("reveal");
        btn.addEventListener("click", () => toggleChoice(btn));
        els.choices.appendChild(btn);
      });

      if (window.MathJax && window.MathJax.typeset) {
        window.MathJax.typeset();
      }
    }

    function toggleChoice(btn) {
      if (state.answered) return;
      const id = btn.dataset.id;
      if (state.selected.has(id)) {
        state.selected.delete(id);
        btn.classList.remove("selected");
      } else {
        state.selected.add(id);
        btn.classList.add("selected");
      }
    }

    function clearSelection() {
      if (state.answered) return;
      state.selected.clear();
      els.choices.querySelectorAll(".choice").forEach(btn => btn.classList.remove("selected"));
    }

    async function submitAnswer() {
      if (state.answered) {
        await nextQuestion();
        return;
      }
      const q = currentQuestion;
      const selected = Array.from(state.selected).sort();
      const answers = q.answers.slice().sort();
      const correct = selected.length === answers.length && selected.every((v, i) => v === answers[i]);

      state.answered = true;
      state.total += 1;
      if (correct) {
        state.correct += 1;
        state.streak += 1;
      } else {
        state.streak = 0;
      }
      saveStats();
      updateStatsUI();

      const neededLabels = answers.map(id => propertyById(id)?.label || id).join("、");
      const pickedLabels = selected.length
        ? selected.map(id => propertyById(id)?.label || id).join("、")
        : "未選擇";

      showModal(correct ? "ok" : "bad", `
        <strong>${correct ? "答對" : "答錯"}</strong><br />
        你選擇：${pickedLabels}<br />
        正確需要：${neededLabels}<br />
        解析：${q.explain}
      `);

      if (window.MathJax && window.MathJax.typeset) {
        window.MathJax.typeset();
      }

      els.btnSubmit.textContent = state.index === questionLoader.total - 1 ? "完成" : "下一題";
    }

    async function nextQuestion() {
      if (!state.answered) return;
      if (state.index < questionLoader.total - 1) {
        state.index += 1;
        els.btnSubmit.textContent = "送出作答";
        currentQuestion = await questionLoader.next();
        renderQuestion();
      } else {
        showModal("", `
          <strong>本輪完成</strong><br />
          正確率：${state.correct} / ${state.total}
        `);
        els.btnSubmit.disabled = true;
        els.btnClear.disabled = true;
      }
    }

    function showModal(styleClass, html) {
      els.modalContent.innerHTML = html;
      els.modalCard.classList.remove("ok", "bad");
      if (styleClass) {
        els.modalCard.classList.add(styleClass);
      }
      els.modal.classList.add("show");
      if (window.MathJax && window.MathJax.typeset) {
        window.MathJax.typeset();
      }
    }

    function hideModal() {
      els.modal.classList.remove("show");
    }

    async function advanceFromModal() {
      hideModal();
      if (state.answered && state.index < questionLoader.total - 1) {
        await nextQuestion();
      }
    }

    els.btnClear.addEventListener("click", clearSelection);
    els.btnSubmit.addEventListener("click", submitAnswer);
    els.modalClose.addEventListener("click", advanceFromModal);
    els.modal.addEventListener("click", advanceFromModal);
    els.modalCard.addEventListener("click", (event) => event.stopPropagation());

    async function init() {
      localStorage.removeItem("mathGameStats");
      state.correct = 0;
      state.total = 0;
      state.streak = 0;
      updateStatsUI();
      try {
        const indexData = await loadIndex();
        PROPERTIES = indexData.properties;
        questionLoader = createQuestionLoader(indexData);
        if (!questionLoader.total) {
          throw new Error("題庫為空");
        }
        currentQuestion = await questionLoader.next();
        renderQuestion();
      } catch (err) {
        els.question.textContent = "題庫載入失敗，請檢查 index.json";
        els.choices.innerHTML = "";
        els.btnSubmit.disabled = true;
        els.btnClear.disabled = true;
      }
    }

    init();
  </script>
</body>
</html>
