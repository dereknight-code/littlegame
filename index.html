<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>數學能力小遊戲</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script defer src="data.js"></script>
  <script defer src="app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="header">
    </div>
    <div class="stats" id="statsBox">
      <div class="scoreboard">
        <div>
          <div class="score-title">計分板</div>
          <div class="score-meta" id="scoreMeta">第 1 題 / 1 題</div>
        </div>
        <div class="score-cells">
          <div class="score-cell">
            <div class="score-num correct" id="statCorrect">0</div>
            <div class="score-label">正確</div>
          </div>
          <div class="score-cell">
            <div class="score-num wrong" id="statWrong">0</div>
            <div class="score-label">錯誤</div>
          </div>
        </div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="card">
      <div class="question-label">題目</div>
      <div class="question-box">
        <div class="question" id="questionText">載入中...</div>
        <div class="tags" id="questionTags"></div>
      </div>
      <div class="choices" id="choiceList"></div>

      <div class="actions">
        <button class="btn btn-ghost" id="btnClear">清除選取</button>
        <button class="btn btn-primary" id="btnSubmit">送出作答</button>
      </div>
    </div>

    <div class="footer">點選下方性質來完成解題所需的要點</div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card" id="modalCard">
      <div id="modalContent"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="modalClose">知道了</button>
      </div>
    </div>
  </div>
</body>
</html>
